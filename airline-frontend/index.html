<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Infiniti Sky</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"/>
</head>
<body>

<header class="header">
    <nav class="navbar container">
        <div class="logo-container">
            <img src="assets/images/logo.png" alt="logo">
            <h2>Infiniti Sky</h2>
        </div>
        <ul class="nav-links">
            <li id="nav-login">
                <a href="login.html">
                    <i class="fa-regular fa-user"></i> Iniciar Sesión
                </a>
            </li>
            <li>
                <a href="claims.html">
                    <i class="fa-regular fa-face-frown"></i> Reclamos
                </a>
            </li>
            <li id="nav-trips" style="display:none">
                <a href="my-trips.html">
                    <i class="fa-solid fa-suitcase"></i> Mis Viajes
                </a>
            </li>
            <li>
    <a href="profile.html">
        <i class="fa-solid fa-user-gear"></i> Mi Perfil
    </a>
</li>
            <li id="nav-logout" style="display:none">
                <a href="#" id="btn-logout">
                    <i class="fa-solid fa-right-from-bracket"></i>
                    <span id="nav-username"></span> Salir
                </a>
            </li>
        </ul>
    </nav>
</header>

<section class="hero">
    <div class="hero-overlay">
        <div class="hero-content container">
            <h1 class="serif-font">Millones de viajes en un solo lugar</h1>
            
            <div class="search-box">
                <div class="input-group">
                    <label>Origen</label>
                    <select id="search-origin">
                        <option value="">Todos</option>
                        <option value="San Salvador">San Salvador</option>
                        <option value="Guatemala">Guatemala</option>
                        <option value="Miami">Miami</option>
                    </select>
                </div>
                <div class="input-group">
                    <label>Destino</label>
                    <select id="search-dest">
                        <option value="">Todos</option>
                        <option value="Los Angeles">Los Ángeles</option>
                        <option value="Mexico">Ciudad de México</option>
                        <option value="Roma">Roma</option>
                        <option value="Puerto Vallarta">Puerto Vallarta</option>
                    </select>
                </div>
                <div class="input-group">
                    <label>Clase</label>
                    <select>
                        <option>Económica</option>
                        <option>Business</option>
                        <option>Premium</option>
                    </select>
                </div>
                <button class="search-btn" id="search-btn">Buscar</button>
            </div>
        </div>
    </div>
</section>

<section class="promo-banner container">
    <div class="promo-card">
        <span>¿Aún no sabes dónde ir?</span>
        <h2 class="serif-font">Explora todos nuestros destinos</h2>
        <a href="#flights-grid" class="promo-btn">Buscar vuelos a cualquier lugar</a>
    </div>
</section>

<section class="destinations container">
    <div class="cards-grid" id="flights-grid">
        </div>
</section>

<footer class="footer">
    <p>© 2026 Marca registrada Infiniti Sky</p>
</footer>

<script src="js/api.js"></script>
<script src="js/auth.js"></script>
<script src="js/app.js"></script>
</body>
</html>
