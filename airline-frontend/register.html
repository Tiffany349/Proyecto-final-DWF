<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crear Cuenta – Infiniti Sky</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/login.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"/>
</head>
<body class="auth-page">

<main class="auth-main">
    <div class="auth-container">
        
        <div class="auth-logo-top">
            <div class="logo-circle">
                <img src="assets/images/logo.png" alt="logo">
            </div>
        </div>

        <h2 class="auth-title serif-font">Crear cuenta</h2>

        <div class="auth-card">
            <form id="register-form" novalidate>
                
                <div class="form-group">
                    <label for="firstname">* Nombre</label>
                    <div class="input-wrapper">
                        <input type="text" id="firstname" autocomplete="given-name">
                    </div>
                    <span class="field-error" id="err-firstname"></span>
                </div>

                <div class="form-group">
                    <label for="lastname">* Apellido</label>
                    <div class="input-wrapper">
                        <input type="text" id="lastname" autocomplete="family-name">
                    </div>
                    <span class="field-error" id="err-lastname"></span>
                </div>

                <div class="form-group">
                    <label for="email">* Correo Electronico</label>
                    <div class="input-wrapper">
                        <input type="email" id="email" autocomplete="email">
                    </div>
                    <span class="field-error" id="err-email"></span>
                </div>

                <div class="form-group">
                    <div class="label-row">
                        <label for="password">* Contraseña</label>
                        <span class="toggle-text">mostrar / ocultar</span>
                    </div>
                    <div class="input-wrapper">
                        <input type="password" id="password" autocomplete="new-password">
                        <button type="button" class="toggle-pw" onclick="togglePassword('password', this)">
                            <i class="fa-regular fa-eye-slash"></i>
                        </button>
                    </div>
                    <span class="field-error" id="err-password"></span>
                </div>

                <p class="required-note">Campos obligatorios o necesarios *</p>

                <div id="global-error"   class="global-error"   style="display:none"></div>
                <div id="global-success" class="global-success" style="display:none"></div>

                <button type="submit" class="btn-flat-blue btn-full" id="btn-register">Crear cuenta</button>
                <a href="index.html" class="btn-flat-darkblue btn-full">Cancelar</a>
            </form>
        </div>

        <footer class="auth-footer">
            <p>©2026 Marca registrada Infinite Sky</p>
        </footer>
    </div>
</main>

<script src="js/api.js"></script>
<script src="js/auth.js"></script>
<script>
    document.addEventListener('DOMContentLoaded', () => {
        if (typeof isLoggedIn === 'function' && isLoggedIn()) window.location.href = 'index.html';

        document.getElementById('register-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            clearErrors();

            const firstname = document.getElementById('firstname').value.trim();
            const lastname  = document.getElementById('lastname').value.trim();
            const email     = document.getElementById('email').value.trim();
            const password  = document.getElementById('password').value.trim();

            let valid = true;
            if (!firstname) { showErr('err-firstname', 'El nombre es requerido.'); valid = false; }
            if (!lastname)  { showErr('err-lastname', 'El apellido es requerido.'); valid = false; }
            if (!email)     { showErr('err-email', 'El correo es requerido.'); valid = false; }
            else if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
                showErr('err-email', 'Ingresa un correo válido.'); valid = false;
            }
            if (!password) { showErr('err-password', 'La contraseña es requerida.'); valid = false; }
            else if (password.length < 6) { showErr('err-password', 'Mínimo 6 caracteres.'); valid = false; }
            
            if (!valid) return;

            const btn = document.getElementById('btn-register');
            btn.disabled = true;
            btn.textContent = 'Creando cuenta...';

            // Combinamos nombre y apellido para enviarlo a tu Auth API existente
            const fullname = `${firstname} ${lastname}`;

            try {
                const data = await Auth.register(fullname, email, password);
                saveSession(data);
                document.getElementById('global-success').textContent = '¡Cuenta creada! Redirigiendo...';
                document.getElementById('global-success').style.display = 'block';
                setTimeout(() => window.location.href = 'index.html', 1500);
            } catch (err) {
                document.getElementById('global-error').textContent = err.message || 'No se pudo crear la cuenta.';
                document.getElementById('global-error').style.display = 'block';
                btn.disabled = false;
                btn.textContent = 'Crear cuenta';
            }
        });
    });

    function clearErrors() {
        document.querySelectorAll('.field-error').forEach(e => e.textContent = '');
        ['global-error','global-success'].forEach(id => {
            const el = document.getElementById(id);
            if(el) el.style.display = 'none';
        });
    }
    
    function showErr(id, msg) { 
        const el = document.getElementById(id);
        if(el) el.textContent = msg; 
    }

    function togglePassword(inputId, btn) {
        const input = document.getElementById(inputId);
        const icon  = btn.querySelector('i');
        if (input.type === 'password') {
            input.type = 'text';
            icon.className = 'fa-regular fa-eye';
        } else {
            input.type = 'password';
            icon.className = 'fa-regular fa-eye-slash';
        }
    }
</script>
</body>
</html>
