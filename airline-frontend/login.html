<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar Sesión – Infiniti Sky</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/login.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"/>
</head>
<body class="auth-page">

<main class="auth-main">
    <div class="auth-container">
        
        <div class="auth-logo-top">
            <div class="logo-circle">
            <img src="assets/images/logo.png" alt="logo">
            </div>
        </div>

        <h2 class="auth-title serif-font">PORTAL DE ACCESO</h2>

        <div class="auth-card">
            <form id="login-form" novalidate>
                
                <div class="form-group">
                    <label for="email">* Correo Electrónico</label>
                    <div class="input-wrapper">
                        <i class="fa-regular fa-user input-icon"></i>
                        <input type="email" id="email" autocomplete="email">
                    </div>
                    <span class="field-error" id="err-email"></span>
                </div>

                <div class="form-group">
                    <div class="label-row">
                        <label for="password">* Contraseña</label>
                        <span class="toggle-text">mostrar / ocultar</span>
                    </div>
                    <div class="input-wrapper">
                        <i class="fa-solid fa-lock input-icon"></i>
                        <input type="password" id="password" autocomplete="current-password">
                        <button type="button" class="toggle-pw" onclick="togglePassword('password', this)">
                            <i class="fa-regular fa-eye-slash"></i>
                        </button>
                    </div>
                    <span class="field-error" id="err-password"></span>
                </div>

                <p class="required-note">Campos obligatorios o necesarios *</p>

                <div id="global-error" class="global-error" style="display:none"></div>

                <button type="submit" class="btn-flat-blue btn-full" id="btn-login">Iniciar sesion</button>
                <a href="index.html" class="btn-flat-darkblue btn-full">Cancelar</a>

                <div class="auth-divider">
                    <span>¿Aun no tienes cuenta?</span>
                </div>

                <div class="center-container">
                    <a href="register.html" class="btn-flat-gray">Crear cuenta</a>
                </div>
            </form>
        </div>
        
        <footer class="auth-footer">
            <p>©2026 Marca registrada Infinite Sky</p>
        </footer>
    </div>
</main>

<script src="js/api.js"></script>
<script src="js/auth.js"></script>
<script>
    document.addEventListener('DOMContentLoaded', () => {
        if (typeof isLoggedIn === 'function' && isLoggedIn()) window.location.href = 'index.html';

        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            clearAuthErrors();

            const email    = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value.trim();

            let valid = true;
            if (!email) { showAuthError('err-email', 'El correo es requerido.'); valid = false; }
            if (!password) { showAuthError('err-password', 'La contraseña es requerida.'); valid = false; }
            if (!valid) return;

            const btn = document.getElementById('btn-login');
            btn.disabled = true;
            btn.textContent = 'Verificando...';

            try {
                const data = await Auth.login(email, password);
                saveSession(data);
                window.location.href = 'index.html';
            } catch (err) {
                document.getElementById('global-error').textContent = 'Correo o contraseña incorrectos.';
                document.getElementById('global-error').style.display = 'block';
                btn.disabled = false;
                btn.textContent = 'Iniciar sesion';
            }
        });
    });

    function clearAuthErrors() {
        document.querySelectorAll('.field-error').forEach(e => e.textContent = '');
        document.getElementById('global-error').style.display = 'none';
    }

    function showAuthError(id, msg) {
        document.getElementById(id).textContent = msg;
    }

    function togglePassword(inputId, btn) {
        const input = document.getElementById(inputId);
        const icon  = btn.querySelector('i');
        if (input.type === 'password') {
            input.type = 'text';
            icon.className = 'fa-regular fa-eye';
        } else {
            input.type = 'password';
            icon.className = 'fa-regular fa-eye-slash';
        }
    }
</script>
</body>
</html>
